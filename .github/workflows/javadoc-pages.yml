name: Publicar Javadoc en Pages

on:
    push:
        branches:
            - stable
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    build-javadoc:
        runs-on: ubuntu-latest

        steps:
            - name: Descargar repositorio
              uses: actions/checkout@v4

            - name: Configurar Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: '21'

            - name: Generar Javadoc
              run: javadoc -d doc -sourcepath src/main/java -subpackages com.tt1.test

            - name: Preparar Pages
              uses: actions/configure-pages@v5

            - name: Subir artefacto de Pages
              uses: actions/upload-pages-artifact@v3
              with:
                  path: docs

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build-javadoc

        steps:
            - name: Desplegar en GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
